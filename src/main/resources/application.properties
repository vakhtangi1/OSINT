spring.application.name=osint-backend

server.port=8080

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/osint_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Better MySQL compatibility
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# File upload settings for PDF import
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Encryption key for protected OSINT fields
# IMPORTANT: Change this before GitHub upload or production demo.
osint.crypto.key=CHANGE_THIS_TO_A_LONG_SECRET_KEY_32_CHARS_MINIMUM

# Logging
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF